    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #E5E7EB;
        }
        .font-display {
            font-family: 'Space Grotesk', sans-serif;
        }
        .glass-effect {
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            overflow: hidden;
        }
        .glow-border {
             box-shadow: 0 0 20px rgba(0, 123, 255, 0.1);
        }
        .btn-glow:hover {
            box-shadow: 0 0 20px rgba(0, 123, 255, 0.4);
        }

        /* Interactive Shine Effect */
        .interactive-shine::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(
                circle 200px at var(--x, 50%) var(--y, 50%),
                rgba(0, 123, 255, 0.2),
                transparent 40%
            );
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
            pointer-events: none;
        }
        .interactive-shine:hover::before {
            opacity: 1;
        }
        
        /* Aurora Background */
        .aurora-background {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
        }
        @keyframes aurora-animation {
            0% { transform: translate(-50%, -50%) rotate(0deg) scale(2); }
            100% { transform: translate(-50%, -50%) rotate(360deg) scale(2); }
        }
        .aurora-background::before, .aurora-background::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 150vw;
            height: 150vw;
            background-image: radial-gradient(circle, #007BFF 0%, transparent 40%), radial-gradient(circle, #46C47C 50%, transparent 80%);
            mix-blend-mode: screen;
            opacity: 0.1;
            filter: blur(100px);
            animation: aurora-animation 80s linear infinite;
        }
        .aurora-background::after {
            animation-direction: reverse;
            animation-duration: 60s;
            background-image: radial-gradient(circle, #FF8C42 0%, transparent 30%), radial-gradient(circle, #007BFF 60%, transparent 90%);
        }
        
        /* Ken Burns Effect */
        @keyframes ken-burns {
            0% { transform: scale(1.1) translate(0, 0); }
            100% { transform: scale(1) translate(0, 0); }
        }
        .ken-burns {
            animation: ken-burns 15s ease-out forwards;
        }

    </style>
